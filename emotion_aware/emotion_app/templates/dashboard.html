<!-- Add this in your dashboard template -->

<div class="row mt-4">
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h5>Total Predictions</h5>
                <h2>{{ total_predictions }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h5>Face Predictions</h5>
                <h2>{{ face_predictions }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h5>Text Predictions</h5>
                <h2>{{ text_predictions }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h5>Multimodal</h5>
                <h2>{{ multimodal_predictions }}</h2>
            </div>
        </div>
    </div>
</div>

<!-- Prediction Type Chart -->
<div class="mt-4">
    <canvas id="typeChart"></canvas>
</div>

<script>
    // Add to your existing Chart.js code
    new Chart(document.getElementById('typeChart'), {
        type: 'pie',
        data: {
            labels: {{ type_labels|safe }},
            datasets: [{
                data: {{ type_data|safe }},
                backgroundColor: ['#667eea', '#f093fb', '#f5576c']
            }]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: 'Prediction Types Distribution'
                }
            }
        }
    });
</script>
